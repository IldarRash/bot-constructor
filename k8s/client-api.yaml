apiVersion: apps/v1
kind: Deployment
metadata:
  name: client-api
  namespace: bot-constructor
  labels:
    app: client-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: client-api
  template:
    metadata:
      labels:
        app: client-api
    spec:
      containers:
        - name: client-api
          image: bot-constructor/client-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
          env:
            # Spring Boot 4 moved Mongo config to spring.mongodb.* and prefers a connection URI.
            - name: MONGO_USER
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_PASS
              valueFrom:
                secretKeyRef:
                  name: mongo-credentials
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: SPRING_MONGODB_URI
              value: "mongodb://$(MONGO_USER):$(MONGO_PASS)@mongo:27017/bot?authSource=admin"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9000
            initialDelaySeconds: 40
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: client-api
  namespace: bot-constructor
spec:
  selector:
    app: client-api
  ports:
    - port: 9000
      targetPort: 9000

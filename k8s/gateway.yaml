apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: bot-constructor
  labels:
    app: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: bot-constructor/gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CLIENT_API_URI
              value: http://client-api:9000
            # WebSocket routing filter needs a ws:// scheme to proxy the RSocket upgrade.
            - name: CLIENT_API_WS_URI
              value: ws://client-api:9000
            - name: BOT_API_URI
              value: http://bot-api:8083
            # Cap heap to the container limit and use SerialGC — fewer GC threads/less overhead on a
            # 1-CPU minikube node. Remove once this service runs as a GraalVM native image.
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75 -XX:+UseSerialGC"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 512Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: bot-constructor
spec:
  selector:
    app: gateway
  ports:
    - port: 8080
      targetPort: 8080
